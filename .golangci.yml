version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: false # No point in linting tests

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - revive
    - errorlint     # catches err == ErrFoo style comparisons (use errors.Is)
    - bodyclose     # missing res.Body.Close() on HTTP responses
    - contextcheck  # context.Context propagation
    - sqlclosecheck # *sql.Rows / *sql.Stmt close checks
    - noctx         # HTTP requests without context
    - gosec         # common security smells
    - unparam       # always-nil error returns, unused params
    - gocyclo       # cyclomatic complexity guard
  exclusions:
    paths:
      - llm-shared
    rules:
      # DB-layer code without context plumbing
      - path: internal/cache/cache\.go
        linters:
          - noctx
      # Test fixtures contain placeholder API keys
      - path: internal/testutil/
        linters:
          - gosec
      # G201 SQL formatting uses validated table names from ValidCacheTableNames / app code
      - path: internal/cache/cache\.go
        text: "G201"
        linters:
          - gosec
      - path: internal/datastore/sqlite\.go
        text: "G201"
        linters:
          - gosec
      # G602 false positive: loop bounds enforce even-length slice
      - path: internal/content/steam_sections\.go
        text: "G602"
        linters:
          - gosec
      - path: internal/datastore/sqlite\.go
        linters:
          - noctx
      - path: cmd/diff/db\.go
        linters:
          - noctx
      - path: cmd/steam/migration\.go
        linters:
          - noctx
  settings:
    govet:
      # shadow disabled: too noisy with standard `if err := f(); err != nil` idiom
    gocyclo:
      # raised from 15 due to existing oversized funcs; ratchet down as code is refactored
      min-complexity: 30
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - exitAfterDefer
        - rangeValCopy
        - hugeParam
        - singleCaseSwitch
        - ifElseChain
        - paramTypeCombine
        - unnamedResult
    gosec:
      # Noisy on CLI tools and user-controlled paths. Keep the security-relevant checks.
      excludes:
        - G301 # dir perms 0755 is project convention
        - G304 # file inclusion via variable (CLI tool intentionally reads user paths)
        - G306 # file perms 0644 (markdown output)
        - G107 # HTTP requests with variable URL (necessary for API clients)
        - G704 # SSRF taint (URLs come from validated config/CLI)
    revive:
      severity: warning
      rules:
        - name: exported
          severity: warning
          disabled: false
          arguments:
            - "sayRepetitiveInsteadOfStutters"
            - "disableStutteringCheck"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
