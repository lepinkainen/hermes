version: "3"

vars:
  FUNCNAME: hermes
  BUILDDIR: build
  COVERAGE_DIR: coverage
  BINARY: "{{.BUILDDIR}}/{{.FUNCNAME}}"

dotenv:
  - .env
  - "{{.ENV}}/.env."
  - "{{.HOME}}/.env"

tasks:
  default:
    desc: Default task, runs build
    cmds:
      - task: build

  build:
    desc: Build the Go application
    deps:
      - test
      - lint
      - clean
    cmds:
      - mkdir -p {{.BUILDDIR}}
      - >
        go build 
        -ldflags="-X main.Version={{.GIT_COMMIT}} -w -s" 
        -o {{.BINARY}}
    generates:
      - "{{.BINARY}}"
    vars:
      GIT_COMMIT:
        sh: git rev-parse --short HEAD

  build-linux:
    desc: Build the Go application for Linux
    deps:
      - test
      - lint
      - clean
    cmds:
      - mkdir -p {{.BUILDDIR}}
      - >
        GOOS=linux GOARCH=amd64 go build 
        -ldflags="-X main.Version={{.GIT_COMMIT}} -w -s" 
        -o {{.BUILDDIR}}/{{.FUNCNAME}}-linux
    generates:
      - "{{.BUILDDIR}}/{{.FUNCNAME}}-linux"
    vars:
      GIT_COMMIT:
        sh: git rev-parse --short HEAD

  build-ci:
    desc: Build the Go application for CI (CI workflow handles test/lint separately)
    deps:
      - clean
    cmds:
      - mkdir -p {{.BUILDDIR}}
      - >
        go build
        -ldflags="-X main.Version={{.GIT_COMMIT}} -w -s"
        -o {{.BINARY}}
    generates:
      - "{{.BINARY}}"
    vars:
      GIT_COMMIT:
        sh: git rev-parse --short HEAD

  test:
    desc: Run Go tests with coverage
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - go test -race -coverprofile={{.COVERAGE_DIR}}/coverage.out ./...
      - go tool cover -html={{.COVERAGE_DIR}}/coverage.out -o {{.COVERAGE_DIR}}/coverage.html
    sources:
      - ./**/*.go
    generates:
      - "{{.COVERAGE_DIR}}/coverage.out"
      - "{{.COVERAGE_DIR}}/coverage.html"

  test-ci:
    desc: Run Go tests with coverage for CI
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - go test -tags=ci -cover ./...
    sources:
      - ./**/*.go
    generates:
      - "{{.COVERAGE_DIR}}/coverage.out"

  lint:
    desc: Run Go linters
    cmds:
      - find . -name "*.go" -not -path "./llm-shared/*" -exec goimports -w {} +
      - golangci-lint run ./...
    sources:
      - ./**/*.go
    silent: true

  vuln-go:
    desc: Scan dependencies for known vulnerabilities (advisory)
    cmds:
      - govulncheck $(go list ./... | grep -v llm-shared)

  deadcode-go:
    desc: Report unreachable Go functions (advisory; interface-only methods are expected false positives)
    cmds:
      - deadcode -test $(go list ./... | grep -v llm-shared)

  cognit-go:
    desc: Report Go functions with cognitive complexity > 20 with per-branch diagnostics (advisory; tests ignored)
    cmds:
      - |
        gocognit -ignore "_test|llm-shared|node_modules" -over 20 -d -json . | jq -r '.[] | "\(.Complexity) \(.PkgName) \(.FuncName) \(.Pos.Filename):\(.Pos.Line):\(.Pos.Column)\n" + ([.Diagnostics[] | "  +\(.Inc) (nest \(.Nesting // 0)) \(.Text) @ \(.Pos.Line):\(.Pos.Column)"] | join("\n"))'

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILDDIR}} {{.COVERAGE_DIR}}

  upgrade-deps:
    desc: Upgrade all dependencies to their latest versions
    silent: true
    cmds:
      - go get -u ./...
      - go mod tidy
      - echo "✅ Dependencies upgraded successfully"
    sources:
      - go.mod
      - go.sum
    generates:
      - go.mod
      - go.sum
